libsu = "6.0.0"

# https://github.com/square/leakcanary/releases
leakCanary = "3.0-alpha-8"

# https://github.com/G00fY2/version-compare/releases
versionCompare = "1.5.0"

[libraries]
libsu = { group = "com.github.topjohnwu.libsu", name = "core", version.ref = "libsu" }

